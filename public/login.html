<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" href="./css/login.css" />
  <meta charset="UTF-8" />
  <title>Login Page</title>
  <!-- Add your CSS styling here -->
</head>

<body>
  <h1 id="title">Workday Scheduler</h1>
  <main id="main">

    <h1>Login</h1>
    <!-- Form sends a POST request to /login -->
    <form action="/login" method="POST">
      <label for="username">Username:</label>
      <input type="text" name="username" id="username" required />
      <br /><br />
      <label for="password">Password:</label>
      <input type="password" name="password" id="password" required />
      <br /><br />
      <button type="submit">SUBMIT</button>
    </form>
    <p>
      If you don't have an account and would like to save in the cloud <a href="/signup">Sign up here</a>.
    </p>
    <p>
      If you don't have an account and would like to save on your devce <a href="/localstorage">Continue</a>.
    </p>
  </main>
  <script src="./js/login.js"></script>
</body>

</html>
